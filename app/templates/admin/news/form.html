{% extends "admin/base_admin.html" %}
{% block title %}{% if noticia %}Editar{% else %}Nueva{% endif %} noticia – FitPal{% endblock %}

{% block admin_content %}
<div class="d-flex align-items-center mb-4 gap-2">
  <a href="{{ url_for('admin.news_list') }}" class="btn btn-outline-secondary btn-sm">
    <i class="bi bi-arrow-left"></i>
  </a>
  <h2 class="fw-bold mb-0">{% if noticia %}Editar noticia{% else %}Nueva noticia{% endif %}</h2>
</div>

<div class="card border-0 shadow-sm" style="max-width:680px">
  <div class="card-body p-4">
    <form method="POST">
      <div class="mb-3">
        <label class="form-label fw-semibold">Título *</label>
        <input type="text" name="title" class="form-control"
               value="{{ noticia.title if noticia else '' }}" required>
      </div>
      <div class="mb-3">
        <label class="form-label fw-semibold">URL de imagen (opcional)</label>
        <input type="url" name="image_url" class="form-control"
               value="{{ noticia.image_url if noticia and noticia.image_url else '' }}"
               placeholder="https://...">
      </div>
      <div class="mb-3">
        <label class="form-label fw-semibold">Contenido *</label>
        <textarea name="content" class="form-control" rows="8" required>{{ noticia.content if noticia else '' }}</textarea>
      </div>
      <div class="mb-4 form-check">
        <input type="checkbox" name="published" class="form-check-input" id="publishedCheck"
               {% if not noticia or noticia.published %}checked{% endif %}>
        <label class="form-check-label" for="publishedCheck">Publicar noticia</label>
      </div>
      <div class="d-flex gap-2">
        <button type="submit" class="btn btn-dark fw-bold">
          {% if noticia %}Guardar cambios{% else %}Crear noticia{% endif %}
        </button>
        <a href="{{ url_for('admin.news_list') }}" class="btn btn-outline-secondary">Cancelar</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
