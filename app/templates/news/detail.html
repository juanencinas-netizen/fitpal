{% extends "base.html" %}
{% block title %}{{ noticia.title }} – FitPal{% endblock %}

{% block content %}
<div class="container py-5" style="max-width:780px">
  <a href="{{ url_for('news.index') }}" class="btn btn-outline-secondary btn-sm mb-4">
    <i class="bi bi-arrow-left me-1"></i>Volver
  </a>
  {% if noticia.image_url %}
  <img src="{{ noticia.image_url }}" class="img-fluid rounded mb-4 w-100"
       style="max-height:380px;object-fit:cover" alt="{{ noticia.title }}">
  {% endif %}
  <h1 class="fw-bold mb-2">{{ noticia.title }}</h1>
  <p class="text-muted small mb-4">
    <i class="bi bi-calendar3 me-1"></i>{{ noticia.created_at.strftime('%d/%m/%Y') }}
  </p>
  <div class="fs-5 lh-lg">
    {{ noticia.content | replace('\n', '<br>') | safe }}
  </div>
</div>
{% endblock %}
