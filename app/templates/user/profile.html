{% extends "base.html" %}
{% block title %}Redirigiendo…{% endblock %}

{% block content %}
  <div class="container py-5 text-center">
    <h3 class="fw-bold">Esta vista fue removida</h3>
    <p class="text-muted">Serás redirigido a tu espacio personal.</p>
    <a href="{{ url_for('user.space') }}" class="btn btn-dark">Ir a Mi Espacio</a>
  </div>

  <script>
    setTimeout(function(){
      window.location.href = "{{ url_for('user.space') }}";
    }, 500);
  </script>
{% endblock %}
