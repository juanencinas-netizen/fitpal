{% extends "base.html" %}
{% block title %}Editar perfil – FitPal{% endblock %}

{% block content %}
<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-md-6">
      <div class="d-flex align-items-center mb-4 gap-2">
        <a href="{{ url_for('user.space') }}" class="btn btn-outline-secondary btn-sm">
          <i class="bi bi-arrow-left"></i>
        </a>
        <h3 class="fw-bold mb-0">Editar perfil</h3>
      </div>

      <div class="card border-0 shadow-sm">
        <div class="card-body p-4">
          <form method="POST">
            <div class="mb-3">
              <label class="form-label fw-semibold">Nombre completo</label>
              <input type="text" name="name" class="form-control" value="{{ current_user.name }}" required>
            </div>
            <div class="mb-3">
              <label class="form-label fw-semibold">Email</label>
              <input type="email" class="form-control" value="{{ current_user.email }}" disabled>
              <small class="text-muted">El email no se puede cambiar.</small>
            </div>

            {% if current_user.password %}
            <hr>
            <h6 class="fw-bold mb-3">Cambiar contraseña</h6>
            <div class="mb-3">
              <label class="form-label">Contraseña actual</label>
              <input type="password" name="current_password" class="form-control">
            </div>
            <div class="mb-4">
              <label class="form-label">Nueva contraseña</label>
              <input type="password" name="new_password" class="form-control" minlength="6">
            </div>
            {% endif %}

            <div class="d-flex gap-2">
              <button type="submit" class="btn btn-dark fw-bold">Guardar cambios</button>
              <a href="{{ url_for('user.space') }}" class="btn btn-outline-secondary">Cancelar</a>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
